version: '3.9'

services:
  # MongoDB Database
  mongo:
    image: mongo:7.0
    container_name: lifedrop-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: lifedrop
    volumes:
      - mongo_data:/data/db
    networks:
      - lifedrop-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # Node.js Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lifedrop-backend
    restart: unless-stopped
    environment:
      MONGO_URI: mongodb://mongo:27017/lifedrop
      JWT_SECRET: ${JWT_SECRET:-lifedrop_default_jwt_secret_change_in_production}
      PORT: 5000
      NODE_ENV: production
      FRONTEND_URL: http://localhost
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - lifedrop-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: lifedrop-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - lifedrop-net

  # Nginx Reverse Proxy
  nginx:
    image: nginx:1.25-alpine
    container_name: lifedrop-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - lifedrop-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mongo_data:
    driver: local

networks:
  lifedrop-net:
    driver: bridge
